name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A0003E: ${{ secrets.A0003E }}
          BA97C5: ${{ secrets.BA97C5 }}
        run: |
          python3 -c "
          import pathlib, os, sys
          sec_a = os.environ.get('A0003E', '')
          sec_b = os.environ.get('BA97C5', '')
          target = pathlib.Path('index.html')
          before = target.read_text(encoding='utf-8')
          after = before
          if sec_a:
              after = after.replace('<!-- 08d10f276787e4c63db4b66fa4d3d8880a8937a739471c -->', sec_a)
          if sec_b:
              after = after.replace('<!-- cca9a40c979009de088bc2dc -->', sec_b)
          if after == before and (sec_a or sec_b):
              sys.exit(1)
          if after != before:
              target.write_text(after, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
